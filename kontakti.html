<style>
*{box-sizing:border-box}
body{background:#0A0A0A;color:#e2e2e2;font-family:'Lexend',sans-serif;touch-action:pan-y}
html{scroll-behavior:smooth;overflow-x:hidden}
.ms{font-family:'Material Symbols Outlined';font-size:inherit;font-style:normal;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;overflow:hidden;display:inline-block}
#mobile-menu{display:none}#mobile-menu.open{display:block}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:none}

</style>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "name": "Контакти — SSG Solutions",
  "description": "Свържете се с SSG Solutions за ремонт в София.",
  "url": "https://ssgsolutions.bg/kontakti.html",
  "mainEntity": {
    "@type": "LocalBusiness",
    "name": "SSG Solutions",
    "telephone": "+359878107395",
    "email": "info@ssg-solutions.eu",
    "areaServed": {"@type": "City", "name": "София"},
    "address": {"@type": "PostalAddress", "addressLocality": "София", "addressCountry": "BG"},
    "priceRange": "от 1 280 €"
  }
}
</script>

<body class="antialiased">
<div id="app"></div>
<script>
/* ── helpers ─────────────────────────────────── */
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==='class') el.className=v;
    else if (k==='innerHTML') el.innerHTML=v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  children.flat().filter(Boolean).forEach(c => el.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return el;
};
function _el(tag, cls, rest) {
  let style = null;
  if (rest.length >= 2 && rest[0] === 'style') { style = rest[1]; rest = rest.slice(2); }
  const el = h(tag, {class: cls}, ...rest);
  if (style) el.style.cssText = style;
  return el;
}
const div  = (cls,...c) => _el('div', cls, c);
const span = (cls,...c) => _el('span', cls, c);
const p    = (cls, attrs, ...c) => {
  const el = h('p', {class: cls, ...attrs}, ...c);
  return el;
};
const wrap = (...c) => div('max-w-[1440px] mx-auto px-5 md:px-20',...c);
const a = (href, cls, ...c) => {
  let style = null, rest = c;
  if (rest.length >= 2 && rest[0] === 'style') { style = rest[1]; rest = rest.slice(2); }
  const el = h('a', {href, class: cls}, ...rest);
  if (style) el.style.cssText = style;
  return el;
};
const img = (src, alt, cls, ...extra) => {
  let style = null;
  if (extra.length >= 2 && extra[0] === 'style') style = extra[1];
  const el = h('img', {src, alt, class: cls||'', loading:'lazy'});
  if (style) el.style.cssText = style;
  return el;
};
const lbl = (txt) => div('text-gold label-caps mb-3', txt);

/* ── nav ─────────────────────────────────────── */
function buildNav(d) {
  const logoEl = h('a',{href:'index.html','class':'flex items-center'},
    img(d.site.logo, d.site.name,'h-10 w-auto object-contain'));

  const desktopLinks = h('ul',{class:'hidden lg:flex gap-8'},
    ...d.nav.map(n => {
      const cls = n.page==='kontakti'
        ? 'text-gold border-b border-gold pb-0.5 label-caps'
        : 'text-white/60 hover:text-white transition-colors label-caps';
      const attrs = {href: n.href, class: cls};
      if (n.target) { attrs.target = n.target; attrs.rel = 'noopener noreferrer'; }
      return h('li',{}, h('a', attrs, n.label));
    })
  );

  const ctaBtn = a('kontakti.html','hidden lg:block bg-gold text-deep-charcoal px-6 py-3 hover:bg-primary-container transition-colors label-caps','Направи запитване');

  const mobileBtn = h('button',{id:'menu-btn','class':'lg:hidden text-gold','aria-label':'Меню'},
    span('ms text-3xl','menu'));

  const mobileMenu = h('div',{id:'mobile-menu','class':'border-t border-secondary-container px-5 py-6 bg-deep-charcoal'},
    h('ul',{class:'space-y-5'},
      ...d.nav.map(n => {
        const attrs = {href: n.href, class:'text-white/70 hover:text-gold block label-caps'};
        if (n.target) { attrs.target = n.target; attrs.rel = 'noopener noreferrer'; }
        return h('li',{}, h('a', attrs, n.label));
      })
    ),
    a('kontakti.html','mt-6 block bg-gold text-deep-charcoal py-4 text-center label-caps','Направи запитване')
  );

  return h('nav',{class:'sticky top-0 z-50 border-b border-secondary-container','style':'background:rgba(10,10,10,.88);backdrop-filter:blur(20px)'},
    wrap(
      h('div',{class:'flex justify-between items-center h-20'}, logoEl, desktopLinks, ctaBtn, mobileBtn)
    ),
    mobileMenu
  );
}

/* ── footer ──────────────────────────────────── */
function buildFooter(d) {
  return h('footer',{class:'bg-deep-charcoal border-t border-secondary-container'},
    h('div',{class:'max-w-[1440px] mx-auto px-5 md:px-20 py-14 grid grid-cols-1 md:grid-cols-4 gap-8'},
      h('div',{class:'md:col-span-2'},
        img(d.site.logo, d.site.name,'h-10 w-auto mb-5 object-contain'),
        h('p',{class:'text-architectural-grey max-w-xs mb-6','style':'font-size:14px;line-height:22px'},d.footer.about),
        h('div',{class:'text-architectural-grey','style':'font-size:11px'},d.site.copyright)
      ),
      buildFooterCol(d.footer.colNav),
      buildFooterCol(d.footer.colLegal)
    )
  );
}
function buildFooterCol(col) {
  return h('div',{},
    h('h4',{class:'text-white mb-5 label-caps'},col.title),
    h('ul',{class:'space-y-3','style':'font-size:14px'},
      ...col.links.map(l => h('li',{}, a(l.href,'text-architectural-grey hover:text-white transition-colors',l.label)))
    )
  );
}

/* ── hero ────────────────────────────────────── */
function buildHero(d) {
  const kt = d.kontakti;
  const accentLine = h('div',{class:'absolute left-0 top-0 h-full w-0.5',style:'background:linear-gradient(180deg,transparent,#e8c33b 25%,#e8c33b 75%,transparent)'});
  const pricingBadge = h('div',{class:'inline-flex items-center gap-2 border border-gold/30 px-4 py-2',style:'background:rgba(232,195,59,.08)'},
    h('span',{class:'ms text-gold',style:'font-size:15px'},'info'),
    h('span',{class:'text-gold label-caps'},kt.pricingNote)
  );
  return h('header',{class:'relative py-32 bg-deep-charcoal border-b border-secondary-container'},
    accentLine,
    wrap(
      div('max-w-2xl reveal',
        div('label-caps text-gold mb-5',kt.heroLabel),
        h('h1',{class:'font-bold text-white uppercase mb-6',style:'font-size:clamp(32px,4.5vw,64px);line-height:1.05;letter-spacing:-.02em'},kt.heroHeading),
        h('p',{class:'mb-8',style:'font-size:clamp(15px,1.4vw,18px);line-height:1.75;color:#A3A3A3'},kt.heroBody),
        pricingBadge
      )
    )
  );
}

/* ── channels ────────────────────────────────── */
function buildChannels(d) {
  const kt = d.kontakti;

  function fbSvg() {
    const s = document.createElement('span');
    s.className = 'flex-shrink-0';
    s.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>';
    return s;
  }
  function igSvg() {
    const s = document.createElement('span');
    s.className = 'flex-shrink-0';
    s.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>';
    return s;
  }
  function waSvg() {
    const s = document.createElement('span');
    s.className = 'flex-shrink-0';
    s.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';
    return s;
  }

  const primary = kt.channels.filter(c=>c.primary);
  const secondary = kt.channels.filter(c=>!c.primary);

  return h('section',{class:'py-28 bg-surface'},
    wrap(
      div('max-w-2xl reveal',
        div('space-y-4 mb-8',
          ...primary.map(ch => {
            const isWa = ch.type==='whatsapp';
            const el = h('a',{
              href: ch.href,
              class: isWa
                ? 'flex items-center gap-5 border-2 border-gold text-gold px-8 py-5 hover:bg-gold hover:text-deep-charcoal transition-colors'
                : 'flex items-center gap-5 bg-gold text-deep-charcoal px-8 py-5 hover:bg-primary-container transition-colors'
            });
            if (isWa) { el.appendChild(waSvg()); }
            else { el.appendChild(h('span',{class:'ms',style:'font-size:30px'},ch.icon)); }
            el.appendChild(h('div',{},
              h('div',{style:'font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:3px'},ch.label),
              h('div',{style:'font-size:22px;font-weight:700;letter-spacing:.01em'},ch.value)
            ));
            return el;
          })
        ),
        div('space-y-3',
          ...secondary.map(ch => {
            const attrs = {
              href: ch.href,
              class: 'flex items-center gap-4 border border-secondary-container px-6 py-4 text-white hover:border-gold hover:text-gold transition-colors'
            };
            if (ch.type !== 'email') {
              attrs.target = '_blank';
              attrs.rel = 'noopener noreferrer';
            }
            const el = h('a', attrs);
            if (ch.type==='facebook') el.appendChild(fbSvg());
            else if (ch.type==='instagram') el.appendChild(igSvg());
            else el.appendChild(h('span',{class:'ms text-gold',style:'font-size:22px'},ch.icon));
            el.appendChild(h('div',{},
              h('div',{class:'label-caps',style:'font-size:12px;color:#A3A3A3;margin-bottom:2px'},ch.label),
              h('div',{style:'font-size:13px;font-weight:600'},ch.value)
            ));
            return el;
          })
        )
      )
    )
  );
}

/* ── render ──────────────────────────────────── */
fetch('content.json')
  .then(r=>r.json())
  .then(d=>{
    const app = document.getElementById('app');
    [buildNav(d), buildHero(d), buildChannels(d), buildFooter(d)]
      .filter(Boolean).forEach(s => app.appendChild(s));

    document.getElementById('menu-btn').addEventListener('click',()=>
      document.getElementById('mobile-menu').classList.toggle('open'));

    const obs = new IntersectionObserver(es=>es.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}
    }),{threshold:.1});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
  });
</script>
</body>
</html>
