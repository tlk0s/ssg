      - generic [ref=f25e53]: За системата
      - heading "Brutal — професионално решение за дизайнери и строители с вкус към детайла" [level=2] [ref=f25e54]
      - paragraph [ref=f25e55]: Brutal предлага иновативно решение за водоустойчиви бордове, създадени да устоят на предизвикателствата на влагата. Те са идеални за всички пространства с постоянен контакт с вода — от тоалетни и бани, до спа центрове, мазета и повече.
      - paragraph [ref=f25e56]: Продуктите са изключително удобни за монтаж върху дървени конструкции и осигуряват стабилна и надеждна основа за микроцимент и други декоративни мазилки. Идеални за обръщане на прозорци.
