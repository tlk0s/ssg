const h = (tag, attrs={}, ...ch) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k==='class') el.className=v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  ch.flat().filter(Boolean).forEach(c => el.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return el;
};
// cls, optional attrs object, ...children
const _mk = (tag) => (cls,...c) => {
  const attrs = (c[0] && typeof c[0]==='object' && !c[0].nodeType && !Array.isArray(c[0])) ? c.shift() : {};
  return h(tag,{class:cls,...attrs},...c);
};
