/* ── helpers ─────────────────────────────────── */
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==='class') el.className=v;
    else if (k==='innerHTML') el.innerHTML=v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  children.flat().filter(Boolean).forEach(c => el.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return el;
};
// Shorthand helpers — optional 2nd arg 'style','value' pair sets inline style
function _el(tag, cls, rest) {
  let style = null;
  if (rest.length >= 2 && rest[0] === 'style') { style = rest[1]; rest = rest.slice(2); }
  const el = h(tag, {class: cls}, ...rest);
  if (style) el.style.cssText = style;
  return el;
}
const div  = (cls,...c) => _el('div', cls, c);
const span = (cls,...c) => _el('span', cls, c);
const sec  = (id,cls,...c) => { const e = _el('section', cls, c); e.id=id; return e; };
const wrap = (...c) => div('max-w-[1440px] mx-auto px-5 md:px-20',...c);
// a and img keep their own signature
const a = (href, cls, ...c) => {
  let style = null, rest = c;
  if (rest.length >= 2 && rest[0] === 'style') { style = rest[1]; rest = rest.slice(2); }
  const el = h('a', {href, class: cls}, ...rest);
  if (style) el.style.cssText = style;
  return el;
};
const img = (src, alt, cls, ...extra) => {
  let style = null;
  if (extra.length >= 2 && extra[0] === 'style') style = extra[1];
  const el = h('img', {src, alt, class: cls||'', loading:'lazy'});
  if (style) el.style.cssText = style;
  return el;
};

}

  const f1el = featuredCard(f1,0); f1el.classList.add('col-span-2','md:col-span-2');
  const f2el = featuredCard(f2,.1);

  return sec('','py-28 bg-deep-charcoal border-t border-secondary-container',
    div('max-w-[1440px] mx-auto px-5 md:px-20',
      div('mb-16 reveal',
        span('block text-gold mb-5 label-caps',gl.label),
        h('h2',{class:'font-bold text-white uppercase','style':'font-size:clamp(26px,3.2vw,46px);line-height:1.1;letter-spacing:-.01em'},gl.heading)
      ),
      div('grid grid-cols-2 md:grid-cols-3 gap-3',
        f1el, f2el,
        ...rest.map((p,i) => thumbCard(p,.15+i*.05))
      )
    )
  );
}

function buildCatalogCta(d) {
  const cc = d.catalogCta;
  return sec('catalog','py-28 bg-surface border-t border-secondary-container',
    div('max-w-[1440px] mx-auto px-5 md:px-20',
      div('grid grid-cols-1 lg:grid-cols-12 gap-12 items-center',
        div('lg:col-span-8 reveal',
          span('block text-gold mb-5 label-caps',cc.label),
          h('h2',{class:'font-bold text-white uppercase mb-6','style':'font-size:clamp(26px,3.2vw,46px);line-height:1.1;letter-spacing:-.01em'},
            cc.heading,' ',span('text-gold',cc.headingAccent)
          ),
          h('p',{class:'mb-8','style':'font-size:16px;line-height:26px;color:#A3A3A3;max-width:580px'},cc.body),
          a(cc.cta.href,'inline-flex items-center gap-3 bg-gold text-deep-charcoal px-8 py-4 hover:bg-primary-container transition-colors label-caps',
            h('span',{class:'ms',style:'font-size:20px'},'menu_book'), cc.cta.label
          )
        ),
        div('lg:col-span-4 reveal','style','transition-delay:.2s',
          div('grid grid-cols-2 gap-3',
            ...cc.highlights.map(hl =>
              div(`bg-surface-container border ${hl.accent?'border-gold/40':'border-secondary-container'} p-5 flex flex-col gap-2 hover:border-gold/50 transition-colors`,
                h('span',{class:'ms text-gold',style:'font-size:28px'},hl.icon),
                span(`${hl.accent?'text-gold':'text-white'} font-bold`,'style','font-size:13px',hl.title),
                h('span',{class:'text-architectural-grey',style:'font-size:11px'},hl.sub)
              )
            )
          )
        )
      )
    )
  );
}

function buildContact(d) {
  const ct = d.contact;

  // Create SVG icon elements directly
  function fbSvg() {
    const s = document.createElement('span');
    s.className = 'flex-shrink-0';
    s.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>';
    return s;
  }
  function igSvg() {
    const s = document.createElement('span');
    s.className = 'flex-shrink-0';
    s.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>';
    return s;
  }

  // Social link builder
  function socialLink(href, iconFn, label, handle) {
    const el = h('a', {href, target:'_blank', rel:'noopener noreferrer',
      class:'flex items-center gap-3 border border-secondary-container px-6 py-4 text-white hover:border-gold hover:text-gold transition-colors'});
    el.appendChild(iconFn());
    const info = div('');
    info.appendChild(h('div', {class:'label-caps', style:'font-size:9px;color:#A3A3A3;margin-bottom:2px'}, label));
    info.appendChild(h('div', {style:'font-size:12px;font-weight:600'}, handle));
    el.appendChild(info);
    return el;
  }

  return sec('contact','py-28 bg-deep-charcoal border-t border-secondary-container',
    div('max-w-[1440px] mx-auto px-5 md:px-20',
      div('max-w-2xl reveal',
        span('block text-gold mb-5 label-caps', ct.label||'Контакти'),
        h('h2',{class:'font-bold text-white uppercase mb-6',style:'font-size:clamp(26px,3.2vw,46px);line-height:1.1;letter-spacing:-.01em'}, ct.heading),
        h('p',{class:'mb-12',style:'font-size:16px;line-height:26px;color:#A3A3A3'}, ct.body),
        div('space-y-5',
          // Phone — big gold CTA button
          a(d.site.phoneHref,'flex items-center gap-5 bg-gold text-deep-charcoal px-8 py-5 hover:bg-primary-container transition-colors',
            h('span',{class:'ms',style:'font-size:30px'},'call'),
            div('',
              h('div',{style:'font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:3px'},'Обади се директно'),
              h('div',{style:'font-size:22px;font-weight:700;letter-spacing:.01em'}, d.site.phone)
            )
          ),
          // Email
          div('flex items-center gap-5 border border-secondary-container px-8 py-5',
            h('span',{class:'ms text-gold',style:'font-size:26px'},'mail'),
            div('',
              span('block text-architectural-grey mb-1 label-caps','Имейл'),
              a(`mailto:${d.site.email}`,'text-white hover:text-gold transition-colors','style','font-size:17px;font-weight:700', d.site.email)
            )
          ),
          // Social
          div('flex gap-4',
            socialLink(d.site.facebook, fbSvg, 'Facebook', 'SSG Solutions'),
            socialLink(d.site.instagram, igSvg, 'Instagram', '@ssgssolutions')
          )
        )
      )
    )
  );
}

/* ── render ──────────────────────────────────── */
fetch('content.json')
  .then(r=>r.json())
  .then(d=>{
    const app = document.getElementById('app');
    app.append(
      buildNav(d,'index'),
      buildHero(d),
      buildStats(d),
      buildAbout(d),
      buildServices(d),
      buildHowWeWork(d),
      buildCapabilities(d),
      buildGallery(d),
      buildCatalogCta(d),
      buildContact(d),
      buildFooter(d)
    );
    // mobile menu
    document.getElementById('menu-btn').addEventListener('click',()=>
      document.getElementById('mobile-menu').classList.toggle('open'));
    // scroll reveal
    requestAnimationFrame(()=>{
      const els=document.querySelectorAll('.reveal');
      els.forEach(el=>el.classList.add('animate'));
      const obs=new IntersectionObserver(es=>es.forEach(e=>{
        if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}
      }),{threshold:0,rootMargin:'0px 0px -40px 0px'});
      els.forEach(el=>{
        if(el.getBoundingClientRect().top<window.innerHeight) el.classList.add('visible');
        else obs.observe(el);
      });
    });
  })
  .catch(err=>document.getElementById('app').innerHTML=
    `<p style="color:red;padding:40px">Грешка при зареждане на content.json: ${err}</p>`);
</script>
</body>
</html>
