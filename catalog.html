<script>
/* ── helpers ─────────────────────────────────── */
const h=(tag,attrs,...children)=>{
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='class')el.className=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  children.flat().filter(Boolean).forEach(c=>el.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return el;
};
function _el(tag,cls,rest){
  let style=null;
  if(rest.length>=2&&rest[0]==='style'){style=rest[1];rest=rest.slice(2);}
  const el=h(tag,{class:cls},...rest);
  if(style)el.style.cssText=style;
  return el;
}
const div=(cls,...c)=>_el('div',cls,c);
const span=(cls,...c)=>_el('span',cls,c);
const a=(href,cls,...c)=>{
  let style=null,rest=c;
  if(rest.length>=2&&rest[0]==='style'){style=rest[1];rest=rest.slice(2);}
  const el=h('a',{href,class:cls},...rest);
  if(style)el.style.cssText=style;
  return el;
};
const img=(src,alt,cls,...extra)=>{
  let style=null;
  if(extra.length>=2&&extra[0]==='style')style=extra[1];
  const el=h('img',{src,alt,class:cls||'',loading:'lazy'});
  if(style)el.style.cssText=style;
  return el;
};

/* ── shared: nav + footer (same as index) ─────── */
function buildNav(d){
  const logoEl=h('a',{href:'index.html',class:'flex items-center'},img(d.site.logo,d.site.name,'h-10 w-auto object-contain'));
  const links=h('ul',{class:'hidden lg:flex gap-8'},
    ...d.nav.map(n=>{
      const cls=n.page==='catalog'?'text-gold border-b border-gold pb-0.5 label-caps':'text-white/60 hover:text-white transition-colors label-caps';
      const attrs={href:n.href,class:cls};
      if(n.target){attrs.target=n.target;attrs.rel='noopener noreferrer';}
      return h('li',{},h('a',attrs,n.label));
    })
  );
  const cta=a('kontakti.html','hidden lg:block bg-gold text-deep-charcoal px-6 py-3 hover:bg-primary-container transition-colors label-caps','Направи запитване');
  const mbtn=h('button',{id:'menu-btn',class:'lg:hidden text-gold','aria-label':'Меню'},span('ms text-3xl','menu'));
  const mmenu=h('div',{id:'mobile-menu',class:'border-t border-secondary-container px-5 py-6 bg-deep-charcoal'},
    h('ul',{class:'space-y-5'},...d.nav.map(n=>{
      const attrs={href:n.href,class:'text-white/70 hover:text-gold block label-caps'};
      if(n.target){attrs.target=n.target;attrs.rel='noopener noreferrer';}
      return h('li',{},h('a',attrs,n.label));
    })),
    a('kontakti.html','mt-6 block bg-gold text-deep-charcoal py-4 text-center label-caps','Направи запитване')
  );
  return h('nav',{class:'sticky top-0 z-50 border-b border-secondary-container',style:'background:rgba(10,10,10,.88);backdrop-filter:blur(20px)'},
    h('div',{class:'max-w-[1440px] mx-auto px-5 md:px-20'},
      h('div',{class:'flex justify-between items-center h-20'},logoEl,links,cta,mbtn)
    ),mmenu
  );
}
function buildFooter(d){
  return h('footer',{class:'bg-deep-charcoal border-t border-secondary-container'},
    h('div',{class:'max-w-[1440px] mx-auto px-5 md:px-20 py-12 flex flex-col md:flex-row justify-between gap-8 items-start'},
      h('div',{},img(d.site.logo,d.site.name,'h-10 w-auto mb-4 object-contain'),
        h('div',{class:'text-architectural-grey',style:'font-size:11px'},d.site.copyright)),
      h('div',{class:'flex flex-wrap gap-8'},
        h('div',{},h('h4',{class:'text-white mb-4 label-caps'},'Навигация'),
          h('ul',{class:'space-y-2',style:'font-size:13px'},
            h('li',{},a('index.html','text-architectural-grey hover:text-white transition-colors','Начало')),
            h('li',{},a('catalog.html','text-architectural-grey hover:text-white transition-colors','Каталог')),
            h('li',{},a('kontakti.html','text-architectural-grey hover:text-white transition-colors','Контакти'))
          )
        ),
        h('div',{},h('h4',{class:'text-white mb-4 label-caps'},'Контакти'),
          h('ul',{class:'space-y-2',style:'font-size:13px'},
            h('li',{},a(d.site.phoneHref,'text-architectural-grey hover:text-white transition-colors',d.site.phone)),
            h('li',{},a(`mailto:${d.site.email}`,'text-architectural-grey hover:text-white transition-colors',d.site.email))
          )
        )
      )
    )
  );
}

/* ── catalog sections ────────────────────────── */
function buildCatalogHero(cat,site){
  const ch=cat.hero;
  const [h1txt,...rest]=ch.heading.split(ch.headingAccent);
  return h('header',{class:'bg-surface border-b border-secondary-container'},
    h('div',{class:'max-w-[1440px] mx-auto px-5 md:px-20 py-20 grid grid-cols-1 lg:grid-cols-12 gap-12 items-end'},
      h('div',{class:'lg:col-span-7'},
        h('div',{class:'inline-flex items-center gap-2 border border-secondary-container px-3 py-1.5 mb-8',style:'background:rgba(30,32,32,.7)'},
          h('span',{class:'ms text-gold',style:'font-size:14px'},'verified'),
          span('text-white/70 label-caps',ch.badge)
        ),
        h('h1',{class:'font-bold text-white uppercase mb-5',style:'font-size:clamp(34px,5vw,64px);line-height:1.05;letter-spacing:-.02em'},
          h1txt, span('text-gold',ch.headingAccent), rest[0]||''
        ),
        h('p',{style:'font-size:16px;line-height:26px;color:#A3A3A3;max-width:480px'},ch.body)
      ),
      h('div',{class:'lg:col-span-5 grid grid-cols-3 gap-2'},
        ...ch.stats.map(s=>
          h('div',{class:'bg-surface-container border border-secondary-container p-3 sm:p-5',style:s.value.includes('%')?'border-color:rgba(232,195,59,.4)':''},
            h('div',{class:'text-gold font-bold mb-1',style:'font-size:clamp(20px,5vw,28px);line-height:1'},s.value),
            h('div',{class:'text-architectural-grey leading-tight',style:'font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;word-break:break-word'},s.label)
          )
        )
      )
    )
  );
}

function buildCatNav(products){

    h('div',{id:'cat-nav-inner'},
      h('div',{class:'cat-nav-flex'},
        ...products.map(p=>{
          const lnk=h('a',{href:`#${p.id}`,class:'cat-nav-link'},p.label);
          return lnk;
        })
      )
    )
  );
}

function buildIntro(intro){
  return h('section',{class:'py-20 bg-deep-charcoal border-b border-secondary-container'},
    h('div',{class:'max-w-[1440px] mx-auto px-5 md:px-20 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center'},
      h('div',{class:'reveal'},
        span('block text-gold mb-4 label-caps',intro.label),
        h('h2',{class:'font-bold text-white uppercase mb-6',style:'font-size:clamp(22px,2.8vw,38px);line-height:1.1;letter-spacing:-.01em'},intro.heading),
        h('p',{class:'mb-5',style:'font-size:15px;line-height:25px;color:#A3A3A3'},intro.body1),
        h('p',{style:'font-size:15px;line-height:25px;color:#A3A3A3'},intro.body2)
      ),
      h('div',{class:'grid grid-cols-2 gap-3 reveal',style:'transition-delay:.15s'},
        ...intro.features.map(f=>
          h('div',{class:'product-card p-3 sm:p-6 flex flex-col gap-2'},
            h('span',{class:'ms text-gold',style:'font-size:clamp(20px,6vw,32px)'},f.icon),
            h('div',{class:'text-white font-bold',style:'font-size:13px'},f.title),
            h('div',{class:'text-architectural-grey',style:'font-size:12px;line-height:19px'},f.body)
          )
        )
      )
    )
  );
}

/* size table helper */
function sizeTable(sizes){
  if(!sizes) return null;
  return h('div',{class:'product-card overflow-hidden'},
    h('div',{class:'px-6 pt-6 pb-3 border-b border-secondary-container'},
      h('span',{class:'text-white font-bold',style:'font-size:13px;letter-spacing:.04em'},sizes.title||'НАЛИЧНИ РАЗМЕРИ')
    ),
    h('div',{class:'overflow-x-auto'},
    h('table',{class:'size-table'},
      h('thead',{},h('tr',{},...sizes.headers.map(hd=>h('th',{},hd)))),
      h('tbody',{},...sizes.rows.map(row=>
        h('tr',{},...row.map((cell,i)=>h('td',{},
          i===1&&sizes.headers[1]==='Дебелина'?h('span',{class:'text-gold'},cell):cell
        )))
      ))
    ))
  );
}

/* section header helper */
function sectionHeader(p){
  return h('div',{class:'flex items-end gap-6 mb-12 reveal'},
    h('div',{},
      span('block text-gold mb-3 label-caps',`${p.num} / ${p.label}`),
      h('h2',{class:'font-bold text-white uppercase',style:'font-size:clamp(22px,2.8vw,40px);line-height:1.1;letter-spacing:-.01em'},p.title)
    ),
    h('div',{class:'hidden md:block flex-1 h-px bg-secondary-container mb-2'})
  );
}

function productImg(p, ratio='4/3'){
  if(!p.image) return null;
  return h('div',{class:'border border-secondary-container overflow-hidden mb-6',style:`aspect-ratio:${ratio}`},
    img(p.image, p.imageAlt||p.title,'w-full h-full object-cover')
  );
}

function advantageList(items){
  return h('div',{class:'space-y-3 mb-8'},
    ...items.map(item=>
      h('div',{class:'flex items-start gap-3',style:'font-size:14px;color:#A3A3A3'},
        h('span',{class:'ms text-gold mt-0.5',style:'font-size:17px'},'check_circle'), item
      )
    )
  );
}

/* ── individual product section builders ──────── */
function buildProduct(p, idx){
  const bg = p.bg==='surface' ? 'bg-surface' : 'bg-deep-charcoal';
  const flip = idx % 2 === 1;
  const wrapper = h('section',{id:p.id,class:`py-20 ${bg} border-b border-secondary-container${flip?' flip-layout':''}`},
    h('div',{class:'max-w-[1440px] mx-auto px-5 md:px-20'},
      sectionHeader(p)
    )
  );
  const inner = wrapper.querySelector('.max-w-\\[1440px\\]');

  // Route to specialised layout based on product id
  const layout = buildProductLayout(p);
  if(layout) inner.appendChild(layout);
  return wrapper;
}

function buildProductLayout(p){
  // common two-col: left = image + body, right = sizes
  if(p.id==='bordove'){
    const left = h('div',{class:'reveal'},
      productImg(p),
      h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body)
    );
    if(p.advantages) left.appendChild(advantageList(p.advantages));
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-8'},
      left,
      h('div',{class:'reveal',style:'transition-delay:.12s'}, sizeTable(p.sizes))
    );
  }

  if(p.id==='prag'){
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-12 items-start'},
      h('div',{class:'reveal'},
        productImg(p),
        h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body)
      ),
      h('div',{class:'reveal',style:'transition-delay:.12s'},
        sizeTable(p.sizes),
        p.advantages ? h('div',{class:'mt-6'},advantageList(p.advantages)) : null
      )
    );
  }

  if(p.id==='izvit-bord'){
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-12 items-start'},
      h('div',{class:'reveal'},
        productImg(p),
        h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body)
      ),
      h('div',{class:'reveal',style:'transition-delay:.12s'},
        sizeTable(p.sizes),
        p.features ? h('div',{class:'grid grid-cols-2 gap-4 mt-6'},
          ...p.features.map(f=>h('div',{class:'product-card p-5'},
            h('span',{class:'ms text-gold block mb-3',style:'font-size:26px'},f.icon),
            h('div',{class:'text-white font-bold mb-1',style:'font-size:13px'},f.title),
            h('div',{class:'text-architectural-grey',style:'font-size:12px;line-height:18px'},f.body)
          ))
        ) : null
      )
    );
  }

  if(p.id==='umivalnik'){
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-8'},
      h('div',{class:'reveal'},
        productImg(p),
        h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body)
      ),
      h('div',{class:'reveal',style:'transition-delay:.12s'},
        p.advantages ? h('div',{class:'mb-5'},
          h('div',{class:'text-white font-bold mb-3 label-caps'},'Предимства'),
          h('div',{class:'space-y-2'},...p.advantages.map(adv=>
            h('div',{class:'flex items-start gap-2',style:'font-size:13px;color:#A3A3A3'},
              h('span',{class:'ms text-gold',style:'font-size:15px'},'check'), adv)
          ))
        ) : null,
        p.specs ? h('div',{class:'mb-5'},
          h('div',{class:'text-white font-bold mb-3 label-caps'},'Характеристики'),
          h('div',{class:'space-y-2'},...p.specs.map(sp=>
            h('div',{class:'flex items-start gap-2',style:'font-size:13px;color:#A3A3A3'},
              h('span',{class:'ms text-gold',style:'font-size:15px'},'info'), sp)
          ))
        ) : null,
        p.note ? h('div',{class:'bg-surface-container border border-gold/30 p-5 mb-5'},
          h('div',{class:'text-gold mb-2 label-caps'},p.noteLabel||'Забележка'),
          h('p',{style:'font-size:13px;line-height:21px;color:#A3A3A3'},p.note)
        ) : null,
        sizeTable(p.sizes)
      )
    );
  }

  if(p.id==='membrana'){
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-12 items-start'},
      h('div',{class:'reveal'},
        productImg(p,'4/3')
      ),
      h('div',{class:'reveal',style:'transition-delay:.12s'},
        h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body),
        p.features ? h('div',{class:'space-y-3'},
          ...p.features.map(f=>h('div',{class:'flex items-start gap-3 product-card p-4'},
            h('span',{class:'ms text-gold mt-0.5',style:'font-size:20px'},f.icon),
            h('div',{},
              h('div',{class:'text-white font-bold mb-1',style:'font-size:13px'},f.title),
              h('div',{class:'text-architectural-grey',style:'font-size:12px'},f.body)
            )
          ))
        ) : null,
        p.note ? h('div',{class:'bg-surface-container border border-gold/30 p-8 mt-4'},
          h('div',{class:'text-gold mb-4 label-caps'},p.noteLabel),
          h('p',{style:'font-size:14px;line-height:22px;color:#A3A3A3'},p.note)
        ) : null
      )
    );
  }

  if(p.id==='wc-panel'){
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-12 items-start'},
      h('div',{class:'reveal'},
        productImg(p),
        h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body)
      ),
      h('div',{class:'reveal',style:'transition-delay:.12s'},
        sizeTable(p.sizes),
        p.features ? h('div',{class:'space-y-3 mt-6'},
          ...p.features.map(f=>h('div',{class:'flex items-start gap-3 product-card p-4'},
            h('span',{class:'ms text-gold mt-0.5',style:'font-size:20px'},f.icon),
            h('div',{},
              h('div',{class:'text-white font-bold mb-1',style:'font-size:13px'},f.title),
              h('div',{class:'text-architectural-grey',style:'font-size:12px'},f.body)
            )
          ))
        ) : null
      )
    );
  }

  if(p.id==='dush-tabla'){
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-8'},
      h('div',{class:'reveal'},
        h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body),
        p.advantages ? h('div',{class:'grid grid-cols-2 gap-3 mb-6'},
          ...p.advantages.map(adv=>
            h('div',{class:'flex items-start gap-2',style:'font-size:13px;color:#A3A3A3'},
              h('span',{class:'ms text-gold',style:'font-size:15px'},'check'), adv)
          )
        ) : null,
        h('div',{class:'border border-secondary-container overflow-hidden',style:'aspect-ratio:16/9'},
          img(p.image, p.imageAlt,'w-full h-full object-cover')
        )
      ),
      h('div',{class:'reveal',style:'transition-delay:.12s'},
        sizeTable(p.sizes),
        p.drains ? h('div',{class:'product-card overflow-hidden mt-4'},
          h('div',{class:'px-6 pt-6 pb-3 border-b border-secondary-container'},
            h('span',{class:'text-white font-bold',style:'font-size:13px;letter-spacing:.04em'},p.drains.title)
          ),
          h('div',{class:'p-5 flex flex-wrap gap-2'},
            ...p.drains.models.map(m=>
              h('span',{class:'border border-secondary-container px-3 py-1.5 text-architectural-grey',style:'font-size:11px;font-weight:700'},m)
            )
          )
        ) : null
      )
    );
  }

  if(p.id==='nisha'){
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-12'},
      h('div',{class:'reveal'},
        productImg(p),
        h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body)
      ),
      h('div',{class:'reveal',style:'transition-delay:.12s'},
        sizeTable(p.sizes),
        p.uses ? h('div',{class:'mt-6 mb-4'},
          h('div',{class:'text-white font-bold mb-3 label-caps'},'Препоръчителна употреба'),
          h('div',{class:'space-y-2'},...p.uses.map(u=>
            h('div',{class:'flex items-start gap-2',style:'font-size:13px;color:#A3A3A3'},
              h('span',{class:'ms text-gold',style:'font-size:15px'},'arrow_right'), u)
          ))
        ) : null,
        h('div',{class:'grid grid-cols-3 gap-3 mt-4'},
          [['water_drop','Водоустойчив'],['bolt','Бърз монтаж'],['tile','За плочки']].map(([icon,txt])=>
            h('div',{class:'product-card p-4 text-center overflow-hidden'},
              h('span',{class:'ms text-gold block mb-2',style:'font-size:22px'},icon),
              h('div',{class:'text-architectural-grey label-caps',style:'font-size:8px;letter-spacing:.05em;word-break:break-word;line-height:1.3'},txt)
            )
          )
        )
      )
    );
  }

  if(p.id==='peika'){
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-8'},
      h('div',{class:'reveal'},
        h('div',{class:'border border-secondary-container overflow-hidden mb-6',style:'aspect-ratio:16/9'},
          img(p.image, p.imageAlt,'w-full h-full object-cover')
        ),
        p.features ? h('div',{class:'grid grid-cols-2 gap-3'},
          ...p.features.map(f=>h('div',{class:'product-card p-3 sm:p-6'},
            h('span',{class:'ms text-gold block mb-2',style:'font-size:clamp(18px,5vw,28px)'},f.icon),
            h('div',{class:'text-white font-bold mb-1',style:'font-size:13px'},f.title),
            h('div',{class:'text-architectural-grey',style:'font-size:12px;line-height:19px'},f.body)
          ))
        ) : null
      ),
      h('div',{class:'reveal',style:'transition-delay:.12s'},
        h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body),
        ...(p.models||[]).map(m=>
          h('div',{class:'product-card p-5 mb-3'},
            h('div',{class:'text-gold mb-2 label-caps'},m.tag),
            h('div',{class:'text-white font-bold mb-1',style:'font-size:14px'},m.title),
            h('div',{class:'text-architectural-grey',style:'font-size:13px'},m.spec)
          )
        )
      )
    );
  }

  if(p.id==='rampa'){
    return h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-12 items-start'},
      h('div',{class:'reveal'},
        h('div',{class:'border border-secondary-container overflow-hidden mb-4',style:'aspect-ratio:4/3'},
          img(p.image, p.imageAlt,'w-full h-full object-cover')
        )
      ),
      h('div',{class:'reveal',style:'transition-delay:.12s'},
        h('p',{class:'mb-6',style:'font-size:15px;line-height:25px;color:#A3A3A3'},p.body),
        sizeTable(p.sizes),
        p.compatible ? h('div',{class:'bg-surface-container border border-secondary-container p-5 mt-6'},
          h('div',{class:'text-gold mb-3 label-caps'},'Съвместимост'),
          h('div',{class:'space-y-2'},...p.compatible.map(c=>
            h('div',{class:'flex items-start gap-2',style:'font-size:13px;color:#A3A3A3'},
              h('span',{class:'ms text-gold',style:'font-size:15px'},'check'), c)
          ))
        ) : null
      )
    );
  }

  if(p.id==='aksesоari'){
    return h('div',{class:'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 reveal'},
      ...p.items.map(it=>
        h('div',{class:'product-card p-3 sm:p-6'},
          h('span',{class:'ms text-gold block mb-2',style:'font-size:clamp(18px,5vw,28px)'},it.icon),
          h('div',{class:'text-white font-bold mb-2',style:'font-size:14px'},it.title),
          ...it.specs.map(sp=>h('div',{class:'text-architectural-grey',style:'font-size:12px;margin-bottom:3px'},sp))
        )
      )
    );
  }

  return null;
}

function buildCatalogCta(cta){
  return h('section',{class:'py-24 bg-deep-charcoal border-t border-secondary-container'},
    h('div',{class:'max-w-[1440px] mx-auto px-5 md:px-20 flex flex-col md:flex-row items-center justify-between gap-8'},
      h('div',{class:'reveal'},
        h('h2',{class:'font-bold text-white uppercase mb-3',style:'font-size:clamp(20px,2.5vw,34px);line-height:1.1'},cta.heading),
        h('p',{style:'font-size:15px;color:#A3A3A3'},cta.body)
      ),
      h('div',{class:'flex flex-col sm:flex-row gap-4 reveal',style:'transition-delay:.1s'},
        a(cta.ctaPrimary.href,'bg-gold text-deep-charcoal text-center px-8 py-4 hover:bg-primary-container transition-colors label-caps',cta.ctaPrimary.label),
        a(cta.ctaSecondary.href,'border border-white/30 text-white text-center px-8 py-4 hover:border-gold hover:text-gold transition-colors label-caps',cta.ctaSecondary.label)
      )
    )
  );
}

/* ── render ──────────────────────────────────── */
fetch('content.json')
  .then(r=>r.json())
  .then(d=>{
    const cat=d.catalog;
    const app=document.getElementById('app');
    app.append(
      buildNav(d),
      buildCatalogHero(cat,d.site),
      buildCatNav(cat.products),
      buildIntro(cat.intro),
      ...cat.products.map((p,i)=>buildProduct(p,i)),
      buildCatalogCta(cat.cta),
      buildFooter(d)
    );

    // mobile menu
    document.getElementById('menu-btn').addEventListener('click',()=>
      document.getElementById('mobile-menu').classList.toggle('open'));

    // scroll reveal
    requestAnimationFrame(()=>{
      const els=document.querySelectorAll('.reveal');
      els.forEach(el=>el.classList.add('animate'));
      const obs=new IntersectionObserver(es=>es.forEach(e=>{
        if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}
      }),{threshold:0,rootMargin:'0px 0px -40px 0px'});
      els.forEach(el=>{
        if(el.getBoundingClientRect().top<window.innerHeight)el.classList.add('visible');
        else obs.observe(el);
      });
    });

    // active cat nav on scroll
    const secEls=document.querySelectorAll('section[id]');
    const navLinks=document.querySelectorAll('.cat-nav-link');
    window.addEventListener('scroll',()=>{
      let cur='';
      secEls.forEach(s=>{if(window.scrollY>=s.offsetTop-180)cur=s.id});
      navLinks.forEach(l=>{
        l.classList.remove('active');
        if(l.getAttribute('href')==='#'+cur)l.classList.add('active');
      });
    },{passive:true});
  })
  .catch(err=>document.getElementById('app').innerHTML=
    `<p style="color:red;padding:40px">Грешка при зареждане на content.json: ${err}</p>`);
</script>
</body>
