}

        p('',{style:'font-size:11px;color:#A3A3A3'},'© 2025 SSG Solutions')
      ),
      div('',
        h('h4',{class:'text-white mb-5 label-caps'},'Услуги'),
        h('ul',{class:'space-y-3'},
          ...['Ремонт на баня в София','Ремонт до ключ','Дизайнерски ремонт','Сухо строителство','Лепене на плочки'].map((t,i)=>{
            const hrefs=['remont-banya-sofiya.html','dizainerski-remont.html','dizainerski-remont.html','suho-stroitelstvo-sofiya.html','dizainerski-remont.html'];
            return h('li',{},h('a',{href:hrefs[i],class:'text-architectural-grey hover:text-gold transition-colors',style:'font-size:13px'},t));
          })
        )
      ),
      div('',
        h('h4',{class:'text-white mb-5 label-caps'},'Връзки'),
        h('ul',{class:'space-y-3'},

          h('li',{},h('a',{href:'kontakti.html',class:'text-architectural-grey hover:text-gold transition-colors',style:'font-size:13px'},'Контакти')),
          h('li',{},h('a',{href:INSTAGRAM,target:'_blank',rel:'noopener noreferrer',class:'text-architectural-grey hover:text-gold transition-colors',style:'font-size:13px'},'Проекти (Instagram)'))

}

const app=document.getElementById('app');
app.appendChild(buildNav());
app.appendChild(buildHero());
app.appendChild(buildStats());
app.appendChild(buildBrutal());
app.appendChild(buildProcess());
app.appendChild(buildComparison());
app.appendChild(buildFaq());
app.appendChild(buildCta());
app.appendChild(buildFooter());

const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}}),{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
