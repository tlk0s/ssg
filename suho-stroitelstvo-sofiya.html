          ms('call','text-base'),' ',PHONE_DISPLAY)
      )
    ))
  );
}

function buildFooter(){
  return h('footer',{class:'bg-surface border-t border-secondary-container'},
    div('max-w-[1440px] mx-auto px-5 md:px-20 py-14 grid grid-cols-1 md:grid-cols-3 gap-8',
      div('',h('img',{src:LOGO,alt:'SSG Solutions',class:'h-10 w-auto mb-5 object-contain'}),
        p('max-w-xs mb-6',{style:'font-size:13px;line-height:21px;color:#8C8C8C'},'Сухо строителство в София — гипсокартон, окачени тавани, преградни стени. Бързо и чисто.'),
        p('',{style:'font-size:11px;color:#8C8C8C'},'© 2025 SSG Solutions')),
      div('',h('h4',{class:'text-white mb-5 label-caps'},'Услуги'),
        h('ul',{class:'space-y-3'},
          ...['Сухо строителство','Ремонт на баня в София','Ремонт до ключ','Дизайнерски ремонт','Каталог BRUTAL'].map((t,i)=>{
            const hrefs=['suho-stroitelstvo-sofiya.html','remont-banya-sofiya.html','tsyalosten-remont-sofiya.html','dizainerski-remont.html','catalog.html'];
            return h('li',{},h('a',{href:hrefs[i],class:'text-architectural-grey hover:text-gold transition-colors',style:'font-size:13px'},t));
          })
        )),
      div('',h('h4',{class:'text-white mb-5 label-caps'},'Връзки'),
        h('ul',{class:'space-y-3'},
          h('li',{},h('a',{href:'index.html',class:'text-architectural-grey hover:text-gold transition-colors',style:'font-size:13px'},'Начало')),
          h('li',{},h('a',{href:'catalog.html',class:'text-architectural-grey hover:text-gold transition-colors',style:'font-size:13px'},'Каталог BRUTAL')),
          h('li',{},h('a',{href:'index.html#contact',class:'text-architectural-grey hover:text-gold transition-colors',style:'font-size:13px'},'Контакти')),
          h('li',{},h('a',{href:INSTAGRAM,target:'_blank',rel:'noopener noreferrer',class:'text-architectural-grey hover:text-gold transition-colors',style:'font-size:13px'},'Проекти (Instagram)'))
        ))
    )
  );
}

const app=document.getElementById('app');
app.appendChild(buildNav());
app.appendChild(buildHero());
app.appendChild(buildStats());
app.appendChild(buildServices());
app.appendChild(buildVsMokro());
app.appendChild(buildProcess());
app.appendChild(buildFaq());
app.appendChild(buildCta());
app.appendChild(buildFooter());

const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}}),{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
